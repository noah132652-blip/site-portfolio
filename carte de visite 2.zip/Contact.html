<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact - Portfolio</title>
<link rel="stylesheet" href="styles.css" />

<style>

/* Styles spécifiques pour la page contact */
main {
  max-width: 900px;
  margin: 0 auto;
  padding: 3rem 2rem;
}

#contact {
  margin-top: 2rem;
}

#titre-contact {
  font-size: 2.5rem;
  margin-bottom: 2rem;
  color: var(--txt);
}


address p {
  margin: 1rem 0;
  font-size: 1.1rem;
}

address p:first-child {
  margin-top: 0;
}

address p:last-child {
  margin-bottom: 0;
}

address a {
  font-weight: 500;
  transition: opacity 0.2s;
}

address a:hover {
  opacity: 0.8;
}


label {
  font-weight: 600;
  font-size: 1.05rem;
  color: var(--txt);
  margin-bottom: 0.5rem;
  display: block;
}

input, textarea {
  font: inherit;
  width: 100%;
  padding: 1rem 1.25rem;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--bg);
  color: var(--txt);
  font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus, textarea:focus { 
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.1);
}

textarea {
  min-height: 180px;
  resize: vertical;
  font-family: inherit;
}

button[type="submit"] {
  padding: 1rem 2rem;
  border-radius: 10px;
  border: none;
  background: var(--brand);
  color: var(--brand-contrast);
  cursor: pointer;
  font-size: 1.1rem;
  font-weight: 600;
  transition: transform 0.2s, box-shadow 0.2s;
  align-self: flex-start;
}

button[type="submit"]:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(10, 102, 194, 0.3);
}

button[type="submit"]:active {
  transform: translateY(0);
}

/* Responsive */
@media (max-width: 768px) {
  main {
    padding: 2rem 1rem;
  }

  #titre-contact {
    font-size: 2rem;
  }

  form, address {
    padding: 1.5rem;
  }

  button[type="submit"] {
    width: 100%;
    align-self: stretch;
  }
}
</style>
</head>
<body>
  <header>
   <label>
<input type="checkbox" id="themeToggle" /> 🌙☀️
</label>
    <nav>
      <ul>
        <li><a href="carte de visite.html">À propos</a></li>
        <li><a href="Projet.html">Projet</a></li>
        <li><a href="Contact.html">Contact</a></li>
      </ul>


      
    </nav>
  </header>

  <main>
    <section id="contact" aria-labelledby="titre-contact">
      <h2 id="titre-contact">Contact</h2>
      
      <address>
        <p>📧 Email : <a href="mailto:noah132652@gmail.com">noah132652@gmail.com</a></p>
        <p>🌐 Réseaux : <a href="#" rel="me">LinkedIn</a>, <a href="#" rel="me">Tiktok</a></p>
      </address>

      <form aria-label="Formulaire de contact" action="#" method="post">
        <div>
          <label for="sujet">Sujet</label>
          <input id="sujet" name="sujet" type="text" placeholder="Objet de votre message" required />
        </div>

        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Votre message..." required></textarea>
        </div>

        <button type="submit">Envoyer le message</button>
      </form>
    </section>
  </main>

  <footer>
    <small>© <span id="annee"></span> Noah — BUT MMI</small>
  </footer>

  <script>
    document.getElementById('annee').textContent = new Date().getFullYear();
  </script>
</body>
</html>
